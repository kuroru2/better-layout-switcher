name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build FnSwitch
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Build (Release)
        run: swift build -c release

      - name: Package binary
        run: |
          mkdir -p staging
          cp .build/release/FnSwitch staging/
          cd staging
          zip -r "$GITHUB_WORKSPACE/FnSwitch-macOS.zip" FnSwitch

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FnSwitch-macOS
          path: FnSwitch-macOS.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: FnSwitch-macOS

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FnSwitch v${{ steps.version.outputs.version }}
          draft: false
          generate_release_notes: true
          files: FnSwitch-macOS.zip
